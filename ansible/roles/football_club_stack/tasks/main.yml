---
- name: Render Docker Compose project
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ football_club_project_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Render environment file from Ansible Vault values
  ansible.builtin.template:
    src: env.j2
    dest: "{{ football_club_project_dir }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  no_log: true

- name: Validate rendered Docker Compose config
  ansible.builtin.command:
    cmd: >
      docker compose -f {{ football_club_project_dir }}/docker-compose.yml
      --env-file {{ football_club_project_dir }}/.env config
  register: football_club_stack_compose_config_result
  changed_when: false
  no_log: true

- name: Create nginx config directory
  ansible.builtin.file:
    path: "{{ football_club_project_dir }}/nginx"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy nginx InvoiceNinja config
  ansible.builtin.template:
    src: invoiceninja.conf
    dest: "{{ football_club_project_dir }}/nginx/invoiceninja.conf"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Deploy nginx Laravel config
  ansible.builtin.template:
    src: laravel.conf
    dest: "{{ football_club_project_dir }}/nginx/laravel.conf"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Prepare InvoiceNinja Docker volumes
  ansible.builtin.command:
    cmd: docker volume create {{ football_club_compose_project_name }}_app_storage
  register: football_club_stack_app_storage_volume_result
  changed_when: >
    football_club_stack_app_storage_volume_result.stdout ==
    football_club_compose_project_name ~ '_app_storage'

- name: Initialize InvoiceNinja storage volume for ninja user
  ansible.builtin.command:
    cmd: >
      docker run --rm
      -v {{ football_club_compose_project_name }}_app_storage:/mnt/ninja-volume
      alpine:3.20
      sh -c 'mkdir -p
      /mnt/ninja-volume/framework/cache/data
      /mnt/ninja-volume/framework/sessions
      /mnt/ninja-volume/framework/views
      /mnt/ninja-volume/logs
      && chown -R 999:999 /mnt/ninja-volume
      && chmod -R u+rwX,g+rwX,o-rwx /mnt/ninja-volume'
  changed_when: false

- name: Start football club stack
  ansible.builtin.command:
    cmd: >
      docker compose -p {{ football_club_compose_project_name }}
      -f {{ football_club_project_dir }}/docker-compose.yml
      --env-file {{ football_club_project_dir }}/.env up -d
  register: football_club_stack_compose_up_result
  changed_when: >
    'Started' in football_club_stack_compose_up_result.stderr or
    'Created' in football_club_stack_compose_up_result.stderr or
    'Recreated' in football_club_stack_compose_up_result.stderr
  no_log: true
