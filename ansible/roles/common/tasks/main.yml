---
- name: Ensure apt cache is up to date
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3
      - python3-apt
      - rsync
      - tar
    state: present
  become: true

- name: Ensure project directory exists
  ansible.builtin.file:
    path: "{{ football_club_project_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Ensure backup root directory exists
  ansible.builtin.file:
    path: "{{ football_club_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
